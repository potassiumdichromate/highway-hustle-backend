global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: "highway-hustle-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "localhost:5001"
