groups:
  - name: highway-hustle-backend-alerts
    rules:
      - alert: HighwayHustleHigh5xxRate
        expr: |
          sum(rate(highway_hustle_http_requests_total{status_code=~"5.."}[5m])) 
          /
          clamp_min(sum(rate(highway_hustle_http_requests_total[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on Highway Hustle backend"
          description: "5xx ratio exceeded 5% for 5 minutes."

      - alert: HighwayHustleHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(highway_hustle_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (p95) on Highway Hustle backend"
          description: "P95 HTTP latency exceeded 1.2s for 10 minutes."

      - alert: HighwayHustleNoTraffic
        expr: |
          sum(rate(highway_hustle_http_requests_total[10m])) == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "No traffic observed on backend"
          description: "No HTTP requests observed for 15 minutes."
